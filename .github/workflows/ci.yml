name: CI

# Auto-triggers (push / pull_request) RE-ENABLED on 2026-06-12. The
# 2026-05-24 disable was a billing precaution for a private repo; the
# repo is now public, so GitHub Actions standard runners are free and
# that rationale no longer applies. Also runnable on demand from the
# GitHub UI → Actions → CI → Run workflow, or via `gh workflow run ci.yml`.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # -------------------------------------------------------------------
  # Change detection — lets a docs-only PR skip the compile-heavy Rust
  # jobs (rustfmt / clippy / cross-platform test matrix / rustdoc /
  # cargo-deny) while STILL satisfying the required `CI OK` check.
  #
  # A naive `paths-ignore:` is the wrong tool here: it makes the whole
  # workflow not run, which leaves the required `CI OK` status pending
  # forever and blocks the PR from ever merging. So instead the workflow
  # always runs; this job decides whether any non-docs file changed; the
  # heavy jobs are gated on that decision; the mdBook "user manual" job
  # always runs (it validates the very docs a docs-only PR touches); and
  # `CI OK` treats `skipped` as success. Fail-safe: anything other than a
  # concrete docs-only change set runs the full pipeline.
  # -------------------------------------------------------------------
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          event="${{ github.event_name }}"
          changed=""
          if [ "$event" = "pull_request" ]; then
            changed="$(git diff --name-only \
              '${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}' \
              2>/dev/null || true)"
          elif [ "$event" = "push" ]; then
            before='${{ github.event.before }}'
            if [ -n "$before" ] \
               && [ "$before" != "0000000000000000000000000000000000000000" ] \
               && git cat-file -e "${before}^{commit}" 2>/dev/null; then
              changed="$(git diff --name-only "$before" '${{ github.sha }}' 2>/dev/null || true)"
            fi
          fi
          echo "event=$event"
          echo "changed files:"
          printf '%s\n' "${changed:-<unknown — running full pipeline>}"
          # Default to running everything. Only flip to code=false when we
          # have a concrete, non-empty change set that is ENTIRELY markdown
          # (**.md) or under docs/.
          code=true
          if [ -n "$changed" ] && ! printf '%s\n' "$changed" | grep -qvE '(\.md$|^docs/)'; then
            code=false
          fi
          echo "code=$code"
          echo "code=$code" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------
  # Fast checks — run first, fail the pipeline quickly if basics break
  # -------------------------------------------------------------------
  fmt:
    name: rustfmt
    needs: [changes]
    if: needs.changes.outputs.code != 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    needs: [changes]
    if: needs.changes.outputs.code != 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # -------------------------------------------------------------------
  # Linux test — the REQUIRED merge gate (it is in `ci-ok`'s `needs`).
  # Windows + macOS run non-blocking in `test-cross` below, for signal.
  # -------------------------------------------------------------------
  test:
    name: test / ${{ matrix.os }}
    needs: [changes, fmt, clippy]
    if: needs.changes.outputs.code != 'false'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: System deps (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libocct-foundation-dev libocct-modeling-algorithms-dev \
            libocct-modeling-data-dev libocct-ocaf-dev \
            libgl1-mesa-dev libwayland-dev libxkbcommon-dev \
            libasound2-dev
      - name: PyO3 link flags (macOS)
        # `valenx-py` is a pyo3 extension-module cdylib. PyO3 deliberately
        # does NOT link to libpython (the host interpreter provides the
        # symbols at module-load time), but Apple's ld still rejects the
        # undefined symbols at build time unless told otherwise. Linux
        # resolves the same symbols via lazy binding (no flag needed),
        # and Windows finds the python import lib on PATH. This is
        # exactly the recipe `maturin develop` injects under the hood —
        # we just have to do it ourselves because we go through
        # `cargo build --workspace`.
        #
        # `.cargo/config.toml` would normally hold this, but the
        # workflow's top-level `RUSTFLAGS: "-D warnings"` env var
        # overrides `config.toml`'s rustflags table (Cargo docs are
        # explicit about this). So we append to RUSTFLAGS here.
        if: matrix.os == 'macos-latest'
        run: |
          echo "RUSTFLAGS=$RUSTFLAGS -C link-arg=-undefined -C link-arg=dynamic_lookup" >> "$GITHUB_ENV"
      - run: cargo build --workspace --all-targets
      # Run the scoped QA harness instead of `cargo test --workspace`
      # — see docs/QA.md for why a workspace-wide cargo test is forbidden
      # (file-dialog crates hang headless CI).
      - name: Scoped QA harness (Unix)
        if: matrix.os != 'windows-latest'
        run: bash scripts/qa.sh --tests
      - name: Scoped QA harness (Windows)
        if: matrix.os == 'windows-latest'
        run: pwsh scripts/qa.ps1 --tests

  # -------------------------------------------------------------------
  # Cross-OS test (Windows + macOS) — runs for SIGNAL but does NOT gate
  # the merge: it is intentionally absent from `ci-ok`'s `needs`, so a
  # green Linux test + the fast jobs let a PR merge in ~10-15 min instead
  # of waiting on the ~1 h Windows runner. The maintainer develops on
  # Windows and runs the scoped Windows suite locally before every push,
  # so cross-OS regressions are caught off-CI; these legs still surface
  # any breakage on the PR, just without blocking it.
  # -------------------------------------------------------------------
  test-cross:
    name: test-cross / ${{ matrix.os }}
    needs: [changes, fmt, clippy]
    if: needs.changes.outputs.code != 'false'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: PyO3 link flags (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          echo "RUSTFLAGS=$RUSTFLAGS -C link-arg=-undefined -C link-arg=dynamic_lookup" >> "$GITHUB_ENV"
      - run: cargo build --workspace --all-targets
      - name: Scoped QA harness (Unix)
        if: matrix.os != 'windows-latest'
        run: bash scripts/qa.sh --tests
      - name: Scoped QA harness (Windows)
        if: matrix.os == 'windows-latest'
        run: pwsh scripts/qa.ps1 --tests

  # -------------------------------------------------------------------
  # Docs build — catches broken rustdoc links
  # -------------------------------------------------------------------
  docs:
    name: rustdoc
    needs: [changes, fmt]
    if: needs.changes.outputs.code != 'false'
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  # -------------------------------------------------------------------
  # mdBook user manual — catches broken markdown links, bad code examples.
  # Intentionally NOT gated by `changes`: this is the check that matters
  # for a docs-only PR, so it runs on every change.
  # -------------------------------------------------------------------
  mdbook:
    name: user manual
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check docs/ exists
        id: check
        run: |
          if [ -f docs/book.toml ]; then
            echo "has_book=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_book=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: peaceiris/actions-mdbook@v2
        if: steps.check.outputs.has_book == 'true'
        with:
          mdbook-version: latest
      - run: mdbook build docs
        if: steps.check.outputs.has_book == 'true'

  # -------------------------------------------------------------------
  # License and dependency gating — prevents surprise GPL/commercial deps
  # -------------------------------------------------------------------
  deny:
    name: cargo-deny
    needs: [changes, fmt]
    if: needs.changes.outputs.code != 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check deny.toml exists
        id: check
        run: |
          if [ -f deny.toml ]; then
            echo "has_deny=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_deny=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: EmbarkStudios/cargo-deny-action@v2
        if: steps.check.outputs.has_deny == 'true'
        with:
          command: check all

  # NOTE: A standalone `cargo-audit` job used to live here. Removed
  # because `cargo-deny`'s `[advisories]` section (deny.toml line 12)
  # consults the same RustSec advisory DB and already runs in CI. Two
  # jobs against the same DB is double work and double maintenance —
  # and the `rustsec/audit-check@v2` action installs cargo-audit from
  # source, which currently fails on our pinned rustc 1.88.0 because
  # the latest cargo-audit's transitive `smol_str` requires rustc
  # 1.89. If you want cargo-audit back, install it via prebuilt binary
  # (e.g. taiki-e/install-action) or wait for the toolchain bump.

  # -------------------------------------------------------------------
  # Summary job — single required status check for branch protection.
  # `if: always()` so it still reports on docs-only PRs (where the Rust
  # jobs are skipped); skipped Rust jobs count as success here.
  # -------------------------------------------------------------------
  ci-ok:
    name: CI OK
    needs: [changes, fmt, clippy, test, docs, mdbook, deny]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        shell: bash
        run: |
          changes='${{ needs.changes.result }}'
          mdbook='${{ needs.mdbook.result }}'
          fmt='${{ needs.fmt.result }}'
          clippy='${{ needs.clippy.result }}'
          test='${{ needs.test.result }}'
          docs='${{ needs.docs.result }}'
          deny='${{ needs.deny.result }}'
          echo "changes=$changes mdbook=$mdbook fmt=$fmt clippy=$clippy test=$test docs=$docs deny=$deny"
          # Jobs that run on EVERY change (including docs-only) must be green.
          for r in "$changes" "$mdbook"; do
            if [ "$r" != "success" ]; then
              echo "::error::an always-run job did not succeed"; exit 1
            fi
          done
          # The compile-heavy Rust jobs are gated by the `changes` job: each
          # must be either success (code changed) or skipped (docs-only). A
          # real failure or cancellation here fails the gate.
          for r in "$fmt" "$clippy" "$test" "$docs" "$deny"; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "::error::a required Rust job did not pass (got '$r')"; exit 1
            fi
          done
          echo "All required CI jobs passed (skipped Rust jobs = docs-only change)."
