name: Release

# Builds the DEFAULT-feature `valenx` desktop binary for each OS and
# uploads a portable archive (binary + licenses + a short README) to a
# DRAFT GitHub Release for the pushed tag. A human reviews the draft and
# publishes it manually — this workflow NEVER auto-publishes.
#
# Targets:
#   - windows-latest  x86_64-pc-windows-msvc   → .zip      (first-class)
#   - ubuntu-latest   x86_64-unknown-linux-gnu → .tar.gz   (first-class)
#   - macos-latest    aarch64-apple-darwin     → .tar.gz   (EXPERIMENTAL;
#                     continue-on-error, GUI not yet verified on macOS)
#
# We ship the DEFAULT build: the optional OpenCASCADE / EGL / --all-features
# CAD adapters are NOT compiled in, so the resulting `valenx` binary is
# self-contained apart from the OS's standard GPU drivers (Vulkan/DX12 on
# Windows, Vulkan/GL on Linux).
#
# This is the lightweight PORTABLE-ARCHIVE release path. The native OS
# INSTALLERS (.deb / .rpm / .dmg / .msi via cargo-deb / cargo-generate-rpm /
# cargo-bundle / cargo-wix, with code signing) are documented in
# docs/INSTALLER.md and were previously wired here; that heavier matrix can
# be reintroduced as a separate workflow when 1.0 packaging lands.

on:
  # Auto-fire on a version tag push (e.g. `git tag v0.1.0-alpha.1 && git push --tags`).
  push:
    tags:
      - 'v*'
  # Still runnable on demand for a specific tag (GitHub UI → Actions →
  # Release → Run workflow, or `gh workflow run release.yml -f tag=v...`).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0-alpha.1)'
        required: true
      draft:
        description: 'Create as draft release?'
        required: false
        default: 'true'
        type: boolean

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10

# Single concurrency group so re-tagging cancels in-flight builds.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------
  # Windows — x86_64-pc-windows-msvc. First-class (tested-build).
  # Packages valenx.exe + licenses + README into a .zip.
  # -------------------------------------------------------------------
  windows:
    name: windows (x86_64-pc-windows-msvc)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="valenx-app") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved valenx-app version: $VERSION"
      - name: Build release binary
        run: cargo build --release -p valenx-app --bin valenx --target x86_64-pc-windows-msvc
      - name: Package .zip
        shell: pwsh
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          $name = "valenx-$env:VERSION-x86_64-pc-windows-msvc"
          $stage = "dist/$name"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/valenx.exe" "$stage/"
          Copy-Item "LICENSE-MIT"    "$stage/"
          Copy-Item "LICENSE-APACHE" "$stage/"
          Copy-Item ".github/release-readme.md" "$stage/README.txt"
          Compress-Archive -Path "$stage/*" -DestinationPath "dist/$name.zip" -Force
          Get-ChildItem dist
      - uses: actions/upload-artifact@v7
        with:
          name: windows-zip
          path: dist/*.zip
          if-no-files-found: error

  # -------------------------------------------------------------------
  # Linux — x86_64-unknown-linux-gnu. First-class (tested-build).
  # Installs the same apt system-deps as ci.yml's default-feature build,
  # then packages the `valenx` binary + licenses + README into a .tar.gz.
  # -------------------------------------------------------------------
  linux:
    name: linux (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: System deps (Ubuntu)
        # Same default-feature GUI/audio libs the ci.yml `test` job installs
        # (NOT the --all-features OpenCASCADE/EGL set — those adapters aren't
        # in the default release build).
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libwayland-dev libxkbcommon-dev \
            libasound2-dev pkg-config
      - name: Resolve version
        id: ver
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="valenx-app") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved valenx-app version: $VERSION"
      - name: Build release binary
        run: cargo build --release -p valenx-app --bin valenx --target x86_64-unknown-linux-gnu
      - name: Package .tar.gz
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          name="valenx-${VERSION}-x86_64-unknown-linux-gnu"
          stage="dist/${name}"
          mkdir -p "${stage}"
          cp target/x86_64-unknown-linux-gnu/release/valenx "${stage}/"
          cp LICENSE-MIT LICENSE-APACHE "${stage}/"
          cp .github/release-readme.md "${stage}/README.txt"
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"
          ls -lah dist
      - uses: actions/upload-artifact@v7
        with:
          name: linux-tar
          path: dist/*.tar.gz
          if-no-files-found: error

  # -------------------------------------------------------------------
  # macOS — apple-darwin. EXPERIMENTAL / best-effort.
  # `continue-on-error: true` so a macOS failure never blocks the
  # Windows + Linux release. The GUI is NOT yet verified on macOS; this
  # job only proves the default build compiles in CI.
  # -------------------------------------------------------------------
  macos:
    name: macos (aarch64-apple-darwin, experimental)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Resolve version
        id: ver
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="valenx-app") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved valenx-app version: $VERSION"
      - name: Build release binary
        run: cargo build --release -p valenx-app --bin valenx --target aarch64-apple-darwin
      - name: Package .tar.gz
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          name="valenx-${VERSION}-aarch64-apple-darwin"
          stage="dist/${name}"
          mkdir -p "${stage}"
          cp target/aarch64-apple-darwin/release/valenx "${stage}/"
          cp LICENSE-MIT LICENSE-APACHE "${stage}/"
          cp .github/release-readme.md "${stage}/README.txt"
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"
          ls -lah dist
      - uses: actions/upload-artifact@v7
        with:
          name: macos-tar
          path: dist/*.tar.gz
          if-no-files-found: error

  # -------------------------------------------------------------------
  # Publish — collect every archive that built and push to a DRAFT
  # GitHub Release for the tag. `draft: true` ALWAYS — a human reviews
  # and clicks "Publish". macOS is best-effort so the publish job does
  # NOT hard-depend on it succeeding.
  # -------------------------------------------------------------------
  publish:
    name: GitHub Release (draft)
    needs: [windows, linux, macos]
    # macOS uses continue-on-error, so `needs: [... macos]` won't block on
    # its failure; require at least the first-class archives to be present.
    if: always() && needs.windows.result == 'success' && needs.linux.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for softprops/action-gh-release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List staged archives
        run: ls -lah dist/
      - name: Create / update DRAFT GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          # ALWAYS a draft — never auto-publish. A maintainer reviews and
          # presses "Publish release" in the GitHub UI.
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            ## Valenx ${{ github.event.inputs.tag || github.ref_name }} — portable builds

            > **Pre-alpha.** This is an early developer build. Expect sharp edges;
            > please file issues.

            Download the archive for your OS, extract it, and run the `valenx`
            binary. The app requires **working GPU drivers**:
            **Vulkan or DX12 on Windows, Vulkan or GL on Linux.**

            | OS | Archive | Status |
            | --- | --- | --- |
            | Windows (x86_64) | `valenx-<ver>-x86_64-pc-windows-msvc.zip` | tested-build |
            | Linux (x86_64) | `valenx-<ver>-x86_64-unknown-linux-gnu.tar.gz` | tested-build |
            | macOS (Apple Silicon) | `valenx-<ver>-aarch64-apple-darwin.tar.gz` | **experimental** |

            - **Windows / Linux** are *tested-build*: they compile and link in CI on
              every release. (Pre-alpha — broad runtime testing is just beginning.)
            - **macOS is experimental**: it compiles in CI, but the GUI is **not yet
              verified on macOS**. The macOS archive may be missing if that
              best-effort build did not complete — try it at your own risk.

            **Install steps**

            - **Windows:** download the `.zip`, unzip it, run `valenx.exe`.
              (Windows SmartScreen may warn — the binary is unsigned in this
              pre-alpha. Choose "More info → Run anyway".)
            - **Linux:** download the `.tar.gz`, `tar -xzf` it,
              `chmod +x valenx && ./valenx`.
            - **macOS (experimental):** download the `.tar.gz`, extract,
              `chmod +x valenx && ./valenx`. Gatekeeper will block an unsigned
              binary — `xattr -dr com.apple.quarantine valenx` then retry.

            Each archive also contains `LICENSE-MIT`, `LICENSE-APACHE`, and a
            short `README.txt`.
          files: |
            dist/*.zip
            dist/*.tar.gz
