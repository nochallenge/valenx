[package]
name = "valenx-mcp"
description = "MCP server exposing Valenx capabilities (docking, dry-run, schema, catalog) to LLM clients over stdio."

version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true

publish.workspace     = true
[dependencies]
anyhow             = { workspace = true }
nalgebra           = { workspace = true }
serde              = { workspace = true }
serde_json         = { workspace = true }
tokio              = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }

valenx-core = { path = "../valenx-core" }
valenx-dock = { path = "../valenx-dock" }
# Native-capable adapters whose info() drives `list_adapters`. We
# depend on the adapter crates directly rather than valenx-app so the
# MCP server never pulls the GUI in transitively.
valenx-adapter-vina = { path = "../valenx-adapters/bio/valenx-adapter-vina" }
# Generative-design tools: an external LLM drives parametric CAD through
# the feature tree + sketcher + kernel. These crates are all pure-data /
# compute (no GUI), so the MCP server stays GUI-free.
valenx-feature-tree = { path = "../valenx-feature-tree" }
valenx-sketch       = { path = "../valenx-sketch" }
valenx-cad          = { path = "../valenx-cad" }
valenx-mesh         = { path = "../valenx-mesh" }
valenx-step-iges    = { path = "../valenx-step-iges" }

# Round-25 H1: libc for the `O_NOFOLLOW` flag on Unix
# `sandbox_open_read`. Pre-fix `sandbox_check` +
# `read_capped_to_string` was a TOCTOU pair — between the
# parent-canonicalise check and the file open, an attacker who can
# write to the sandbox dir could swap a symlink into the leaf path;
# the subsequent open would silently follow the link out of the
# sandbox. `O_NOFOLLOW` makes the open itself refuse to traverse a
# leaf symlink, closing the race. Windows uses
# `FILE_FLAG_OPEN_REPARSE_POINT` (hardcoded as `0x00200000` — no
# windows-sys dep needed for a single one-shot constant).
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[[bin]]
name = "valenx-mcp"
path = "src/bin/valenx-mcp.rs"

[lints.rust]
missing_docs = "warn"
