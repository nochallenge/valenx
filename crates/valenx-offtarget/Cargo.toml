[package]
name        = "valenx-offtarget"
description = "Off-target / cross-reactivity screening for designed protein candidates by sequence similarity (ungapped local identity + k-mer overlap) against a reference set. Research/educational grade heuristic; NOT a validated off-target safety predictor."

version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true

[dependencies]
serde     = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }

[lints.rust]
unused_imports = "warn"
missing_docs   = "warn"
