[package]
name        = "valenx-photogrammetry"
description = "In-house structure-from-motion building blocks (Stages 1-2: features + matching + two-view verification). A clean-room Rust reimplementation of the standard computer-vision pipeline used by COLMAP — FAST-9 corner detection and an ORB-style 256-bit steered-BRIEF descriptor (Stage 1), plus brute-force Hamming descriptor matching with the Lowe ratio test and mutual cross-check, and RANSAC fundamental-matrix estimation via the Hartley normalized 8-point algorithm scored by Sampson distance (Stage 2). Operates on a plain row-major 8-bit grayscale buffer; pure Rust, no `unsafe`. Research/educational grade — textbook FAST/ORB/Lowe/Hartley/RANSAC algorithms, NOT a calibrated metrology / survey-grade product. This stage estimates the fundamental matrix only; relative pose (R, t) and triangulation are a later stage. COLMAP (BSD-3-Clause) is credited as the method reference in THIRD-PARTY-NOTICES; no COLMAP or OpenCV source is used."

version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true

[dependencies]
thiserror = { workspace = true }
nalgebra  = { workspace = true }

[lints.rust]
unused_imports = "warn"
missing_docs   = "warn"
