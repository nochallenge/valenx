[package]
name        = "valenx-draft"
description = "Draft workbench: 2D entities (lines, polylines, arcs, circles, rectangles, polygons, dimensions, text) placed on a working plane in 3D space. Direct-modelling, not parametric."

version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true

publish.workspace     = true
[dependencies]
thiserror = { workspace = true }
nalgebra  = { workspace = true }
serde     = { workspace = true }
ron       = { workspace = true }

# Round-28 H2: canonical atomic_write_str for persist.rs::write_to.
valenx-core = { path = "../valenx-core" }

[lints.rust]
unused_imports = "warn"
missing_docs   = "warn"
