[package]
name        = "valenx-conveyor"
description = "Belt-conveyor bulk-material handling calculator for Valenx. Closed-form steady-state models for a troughed/flat belt: transported cross-sectional load area, mass flow rate (mdot = rho * A * v), volumetric throughput, lift power against an incline (P_lift = mdot * g * h), total drive power from belt tension (P = F * v), and rated capacity that scales linearly with belt speed and load area. Research/educational grade: textbook closed-form/numerical models (CEMA / ISO 5048 style algebra at the introductory level); NOT a clinical/medical/production engineering tool and not a substitute for a certified conveyor-design package or a professional engineer's sign-off."

version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true

publish.workspace = true

[dependencies]
thiserror = { workspace = true }
serde     = { workspace = true }

[dev-dependencies]
# Round-trip serialization tests for the public config / result structs.
serde_json = { workspace = true }

[lints.rust]
unused_imports = "warn"
missing_docs   = "warn"
