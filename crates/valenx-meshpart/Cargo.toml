[package]
name        = "valenx-meshpart"
description = "MeshPart workbench (Phase 32) — finer-grained mesh ↔ BRep round-trip utilities than Phase 23. Polyhedron extraction, naïve polyhedral BRep sewing, normal-based triangle segmentation, boundary loop extraction, planar flattening, polygon triangulation, mesh merge, and plane-based mesh splitting."

version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true

[dependencies]
thiserror = { workspace = true }
nalgebra  = { workspace = true }
serde     = { workspace = true }

valenx-mesh = { path = "../valenx-mesh" }
valenx-cad  = { path = "../valenx-cad" }

[lints.rust]
unused_imports = "warn"
missing_docs   = "warn"
