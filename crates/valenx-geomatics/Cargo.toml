[package]
name        = "valenx-geomatics"
description = "Geomatics / GIS workbench (Phase 35) — WGS84 ↔ UTM coordinate conversion, Digital Elevation Model (DEM) container, XYZ-ASCII DEM loader, DEM-to-mesh surface generator, bilinear DEM sampling. The FreeCAD Geomatics community workbench analogue."

version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true

[dependencies]
thiserror = { workspace = true }
nalgebra  = { workspace = true }
serde     = { workspace = true }
ron       = { workspace = true }

valenx-mesh = { path = "../valenx-mesh" }

[lints.rust]
unused_imports = "warn"
missing_docs   = "warn"
