[package]
name        = "valenx-insulation"
description = "Building-envelope heat-loss models — steady-state conduction through composite walls via thermal resistance R = L/k, surface film coefficients, U-value U = 1/sum(R), and heat-loss rate Q = U*A*dT. Research/educational grade: textbook closed-form one-dimensional steady-state models; NOT a clinical/medical/production engineering tool — do not use for code-compliance energy modelling, HVAC sizing, or any safety-critical decision."

