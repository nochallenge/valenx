[package]
name         = "valenx-app"
description  = "The Valenx desktop application binary. Native window, ribbon, browser tree, viewport, timeline, command palette."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true
readme.workspace       = true
default-run = "valenx"
# Windows resource embedding (Valenx app icon -> valenx.exe). See
# `build.rs` for the cfg(target_os = "windows") logic that picks up
# `wix/valenx.ico` and packs it into the PE's resource section so
# File Explorer / Alt+Tab / the taskbar all show the right icon for
# the running process. The script is a no-op on Linux + macOS.
build = "build.rs"

publish.workspace     = true
[[bin]]
name = "valenx"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
anyhow             = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
# png: pure-Rust PNG encoder for headless render-to-PNG (and the
# headless_screenshots dev test). Already resolved transitively
# (eframe -> image 0.25 -> png 0.18), so promoting it adds no new tree.
png                = "0.18"

# Native shell. eframe pulls in winit + a glow rendering backend;
# replacing with a wgpu backend is a feature swap, not an API
# rewrite.
eframe     = { workspace = true }
egui       = { workspace = true }
egui_plot  = { workspace = true }
egui_tiles = { workspace = true }
rfd        = { workspace = true }
bytemuck   = { workspace = true }
# `opener` opens a URL or filesystem path in the user's default
# handler — ShellExecuteW on Windows, `open(1)` on macOS, the xdg-
# open preference order on Linux. Replaces a hand-rolled
# `cmd /C start "" <url>` shell-out in landing_page::open_link which
# was vulnerable to cmd.exe metachar re-parsing of paths containing
# `&`, `^`, `|`, etc. License: MIT OR Apache-2.0 (already covered by
# deny.toml's allowlist).
opener     = { workspace = true }
nalgebra   = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
toml       = { workspace = true }

valenx-core          = { path = "../valenx-core" }
valenx-geo           = { path = "../valenx-geo" }
valenx-mesh          = { path = "../valenx-mesh" }
valenx-fields        = { path = "../valenx-fields" }
valenx-viz           = { path = "../valenx-viz" }
# Render-bridge: the Cook-Torrance PBR library + the WGSL forward
# shader source the pbr_forward_pass module wires into the live wgpu
# device.
valenx-render-bridge = { path = "../valenx-render-bridge" }
valenx-icons         = { path = "../valenx-icons" }
valenx-audit         = { path = "../valenx-audit" }
valenx-rbac          = { path = "../valenx-rbac" }
valenx-optimize      = { path = "../valenx-optimize" }
valenx-export        = { path = "../valenx-export" }
valenx-fonts         = { path = "../valenx-fonts" }
valenx-design-tokens = { path = "../valenx-design-tokens" }
valenx-cad           = { path = "../valenx-cad" }
valenx-dock          = { path = "../valenx-dock" }
valenx-bio           = { path = "../valenx-bio" }
valenx-sketch        = { path = "../valenx-sketch" }
valenx-draft         = { path = "../valenx-draft" }
valenx-techdraw      = { path = "../valenx-techdraw" }
valenx-assembly      = { path = "../valenx-assembly" }
valenx-feature-tree  = { path = "../valenx-feature-tree" }
valenx-step-iges     = { path = "../valenx-step-iges" }
valenx-surface       = { path = "../valenx-surface" }
valenx-cam           = { path = "../valenx-cam" }
valenx-arch          = { path = "../valenx-arch" }
valenx-spreadsheet   = { path = "../valenx-spreadsheet" }
valenx-macro         = { path = "../valenx-macro" }
valenx-addons        = { path = "../valenx-addons" }
valenx-mesh-to-brep  = { path = "../valenx-mesh-to-brep" }
valenx-fem           = { path = "../valenx-fem" }

# The coupled rocket design→simulate example engine, surfaced by the
# Rocket workbench (src/rocket_workbench.rs). Couples valenx-astro
# (ascent) with valenx-fem (interstage structural check). Research /
# preliminary-design grade — not a flight-certified design tool.
valenx-rocket-demo   = { path = "../valenx-rocket-demo" }

# The Car workbench (src/car_workbench.rs) — vehicle dynamics
# (acceleration, top speed, braking, skidpad) over valenx-vehicle.
valenx-vehicle       = { path = "../valenx-vehicle" }

# Native series / parallel battery-pack sizing — surfaced by the Battery
# Pack workbench (src/batterypack_workbench.rs).
valenx-batterypack   = { path = "../valenx-batterypack" }

# The native 3D external-aerodynamics CFD engine,
# surfaced in the desktop UI by the Aerodynamics / Wind Tunnel
# workbench (src/aero_workbench.rs + src/aero/). A pure-Rust solver
# library; the workbench calls its real API directly (no subprocess).
valenx-aero          = { path = "../valenx-aero" }

# Native 3-phase induction-motor slip / power — surfaced by the Induction
