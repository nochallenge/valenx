# whoami: OS-canonical username lookup (GetUserNameW on Windows,
# getpwuid_r on Unix). Used by `audit::current_actor_id` so the
# user-mutable `$USER` env var can't spoof the audit-log actor / RBAC
# gate on Windows. Round-11 R11-1 fix — pre-fix the function consulted
# `$USER` first, which let an unprivileged Windows shell `set
# USER=admin@example.com` and bypass both. License is
# Apache-2.0 OR BSL-1.0 OR MIT (all in deny.toml allow-list).
whoami = "2.1.1"

[dev-dependencies]
# Used by the run-orchestration unit test's dummy adapter.
semver   = { workspace = true }
# Viewport tests build small canonical meshes directly.
nalgebra = { workspace = true }
# tempfile lets settings tests create real on-disk directories so
# `push_recent_project`'s canonicalisation branch (which only fires
# when the path actually exists) gets exercised. Pinned to 3.x; the
# crate is already in the lockfile as a transitive dep of rfd ->
# ashpd -> zbus -> uds_windows, so no new tree.
tempfile = "3"
# pollster: a minimal block-on executor for the headless GPU render
# test (wgpu_renderer's `headless_ui_tests`). `wgpu`'s
# request_adapter / request_device / buffer-map are `async`; the test
# is synchronous, so it blocks on them with pollster. Pinned to 0.3
# to match the version `wgpu` (via eframe) already resolves — no new
# transitive tree.
pollster = "0.3"
# naga: the WGSL front-end + validator wgpu runs inside
# create_shader_module. The wgpu_renderer headless test validates the
# private viewport `SHADER_WGSL` with it (GPU-free shader-soundness
# proof). Pinned to 0.20 to match the version wgpu 0.20 (via eframe)
# already resolves in the lockfile.
naga = { version = "0.20", features = ["wgsl-in"] }

# ===========================================================================
# Build-script dependencies — embed-resource compiles the per-target
# .rc file produced by `build.rs` so the Valenx app icon ships inside
# valenx.exe's PE resource section. Gated on cfg(windows) so the
# Linux + macOS workspace builds never pull this dependency into the
# graph.
# ===========================================================================

[target.'cfg(windows)'.build-dependencies]
embed-resource = "3.0"

# ===========================================================================
# Packaging metadata — feeds the release pipeline in
# .github/workflows/release.yml. Each [package.metadata.<tool>] block
# is read by the matching cargo-* helper at package time.
# ===========================================================================

# cargo-wix (Windows .msi via WiX 3.x).
# Run: `cargo wix -p valenx-app` (after `cargo build --release`).
# The custom template at `wix/main.wxs` is picked up automatically
# because it sits at the standard cargo-wix path; we don't need
# `template = "..."` here. `upgrade-guid` MUST match the UpgradeCode
# attribute on the <Product> element in main.wxs so cargo-wix can
# verify the contract.
[package.metadata.wix]
# Stable UpgradeCode - identical to the UpgradeCode attribute on
# <Product> in wix/main.wxs. Windows uses this to recognise that a
# new MSI is an upgrade of the same product (rather than a parallel
# install). Never regenerate.
upgrade-guid = "7530132B-431C-4F23-B9B3-2744F5BE49E1"
# Per-build path-component GUID seed cargo-wix uses for any auto-
# generated component IDs. We hand-author every component in the
# template, but cargo-wix still requires this key.
path-guid    = "63D5237D-A0CA-4114-9B6B-B0AC2A6D6CC2"
# OSS - no end-user licence agreement dialog. Valenx is dual-licensed
# under MIT OR Apache-2.0; both licence files ship in README + Program
# Files\Valenx after install (LICENSE-MIT, LICENSE-APACHE).
license      = false
eula         = false

# cargo-bundle (macOS .app + Windows .exe wrapper).
# Run: `cargo bundle --release` — produces target/release/bundle/<os>/.
[package.metadata.bundle]
name = "Valenx"
identifier = "io.valenx.app"
# Multi-resolution Apple Icon Image. Built by scripts/build_icns.py
# (Python + Pillow); ships the brand mark in every size from 16 to
# 1024 px so Finder + Dock + Launchpad + Cmd-Tab all render crisp at
# 1x and 2x Retina. cargo-bundle copies this into
# Valenx.app/Contents/Resources/AppIcon.icns and writes the matching
# CFBundleIconFile entry into Info.plist. Path is relative to this
# Cargo.toml.
icon = ["../../packaging/macos/valenx.icns"]
# Round-5 fix: bundle both LICENSE files into the .app's Resources/
# directory so end-users opening Valenx.app on macOS can read the
# licence text from Contents/Resources/ without hunting through the
# source repo. cargo-bundle copies these verbatim into
# Valenx.app/Contents/Resources/LICENSE-MIT and ...LICENSE-APACHE.
resources = [
    "../../LICENSE-MIT",
    "../../LICENSE-APACHE",
]
short_description = "Native open-source desktop simulation + life-science suite"
long_description = """
Valenx unifies a stack of open-source simulation tools behind one
Rust-native desktop shell — no browser, no subscription, no
vendor lock-in. 141 live adapters total, including 123 biology +
18 physics / chemistry / MD wrappers across the simulation surface
(OpenFOAM, SU2, CalculiX, Code_Aster, Elmer, OpenRadioss, openEMS,
Meep, PyBaMM, MuJoCo, preCICE, …) plus sequence alignment, variant
calling, structure prediction (AlphaFold 2/3, ESMFold, OpenFold,
RoseTTAFold, ColabFold), protein design (RFdiffusion, ProteinMPNN,
ESM-IF, Chroma), CRISPR + base/prime editing design, RNA secondary
+ tertiary structure, mRNA design, cryo-EM, microscopy,
phylogenetics, population genetics, quantum chemistry, molecular
dynamics, single-cell omics, docking, systems biology, and
reproducible-workflow runners. Ships a headless CLI suite for CI
gates and reproducible pipelines.
"""
copyright = "MIT OR Apache-2.0 — see LICENSE-MIT and LICENSE-APACHE"
category = "Education"
osx_minimum_system_version = "11.0"

# cargo-deb (Debian / Ubuntu .deb package).
# Run: `cargo deb -p valenx-app` — produces target/debian/*.deb.
[package.metadata.deb]
name = "valenx"
maintainer = "Valenx maintainers <maintainers@valenx.io>"
section = "science"
priority = "optional"
extended-description = """\
Valenx unifies a stack of open-source simulation tools behind one
Rust-native desktop shell — no browser, no subscription, no
vendor lock-in. 141 live adapters total, including 123 biology +
18 physics / chemistry / MD wrappers across the simulation surface
(OpenFOAM, SU2, CalculiX, Code_Aster, Elmer, OpenRadioss, openEMS,
Meep, PyBaMM, MuJoCo, preCICE, …) plus sequence alignment,
variant calling, structure prediction (AlphaFold 2/3, ESMFold,
OpenFold, RoseTTAFold, ColabFold), protein design (RFdiffusion,
ProteinMPNN, ESM-IF, Chroma), CRISPR + base/prime editing design,
RNA secondary + tertiary structure, mRNA design (LinearDesign,
DNA Chisel), cryo-EM (RELION, EMAN2, CTFFIND), microscopy,
phylogenetics, population genetics, quantum chemistry, molecular
dynamics, single-cell omics, docking, systems biology, and
reproducible-workflow runners (Snakemake, Nextflow, Cromwell,
cwltool). Ships a headless CLI suite (valenx, valenx-init,
valenx-validate, valenx-mesh-info, valenx-audit, valenx-results,
valenx-report) for CI gates and reproducible pipelines."""
depends = "$auto, libgl1, libwayland-client0, libxkbcommon0"
assets = [
    ["target/release/valenx", "usr/bin/", "755"],
    ["target/release/valenx-init", "usr/bin/", "755"],
    ["target/release/valenx-validate", "usr/bin/", "755"],
    ["target/release/valenx-mesh-info", "usr/bin/", "755"],
    ["target/release/valenx-audit", "usr/bin/", "755"],
    ["target/release/valenx-results", "usr/bin/", "755"],
    ["target/release/valenx-report", "usr/bin/", "755"],
    ["../../README.md", "usr/share/doc/valenx/README.md", "644"],
    ["../../LICENSE-MIT", "usr/share/doc/valenx/LICENSE-MIT", "644"],
    ["../../LICENSE-APACHE", "usr/share/doc/valenx/LICENSE-APACHE", "644"],
    # Desktop integration: the .desktop entry is what makes Valenx
    # appear in GNOME / KDE / XFCE / Unity application menus; the
    # icons land under the freedesktop hicolor theme so the bare
    # `Icon=valenx` reference in the .desktop file resolves to
    # whichever pixel density the launcher needs.
    ["../../packaging/linux/valenx.desktop", "usr/share/applications/", "644"],
    ["../../packaging/linux/valenx-256.png", "usr/share/icons/hicolor/256x256/apps/valenx.png", "644"],
    ["../../packaging/linux/valenx.svg",     "usr/share/icons/hicolor/scalable/apps/valenx.svg", "644"],
]

# cargo-generate-rpm (RPM-based distros — Fedora, RHEL, openSUSE).
# Run: `cargo build --release && cargo generate-rpm -p crates/valenx-app`.
# Asset paths use a sane $RPM_BUILD_ROOT layout.
[package.metadata.generate-rpm]
name = "valenx"
license = "MIT OR Apache-2.0"
summary = "Native open-source desktop simulation suite"
# RPM disallows '-' in version strings (allowed: alphanumeric, '.',
# '_', '+', '%', '{', '}', '~', '^'). Pre-release SemVer like
# `0.1.0-alpha.1` therefore needs to be transliterated to the RPM
# convention `0.1.0~alpha.1` — the tilde sorts BEFORE the final
# `0.1.0` release, matching SemVer pre-release ordering. cargo-
# generate-rpm reads this override field; without it the version is
# inferred from [workspace.package].version which contains the
# rejected '-' character. Re-update when bumping the workspace
# version (e.g. `0.1.0-beta.1` → `0.1.0~beta.1`).
version = "0.1.0~alpha.1"
[[package.metadata.generate-rpm.assets]]
source = "target/release/valenx"
dest = "/usr/bin/valenx"
mode = "0755"
[[package.metadata.generate-rpm.assets]]
source = "target/release/valenx-init"
dest = "/usr/bin/valenx-init"
mode = "0755"
[[package.metadata.generate-rpm.assets]]
source = "target/release/valenx-validate"
dest = "/usr/bin/valenx-validate"
mode = "0755"
[[package.metadata.generate-rpm.assets]]
source = "target/release/valenx-mesh-info"
dest = "/usr/bin/valenx-mesh-info"
mode = "0755"
[[package.metadata.generate-rpm.assets]]
source = "target/release/valenx-audit"
dest = "/usr/bin/valenx-audit"
mode = "0755"
[[package.metadata.generate-rpm.assets]]
source = "target/release/valenx-results"
dest = "/usr/bin/valenx-results"
mode = "0755"
[[package.metadata.generate-rpm.assets]]
source = "target/release/valenx-report"
dest = "/usr/bin/valenx-report"
mode = "0755"
[[package.metadata.generate-rpm.assets]]
source = "../../README.md"
dest = "/usr/share/doc/valenx/README.md"
mode = "0644"
[[package.metadata.generate-rpm.assets]]
source = "../../LICENSE-MIT"
dest = "/usr/share/doc/valenx/LICENSE-MIT"
mode = "0644"
[[package.metadata.generate-rpm.assets]]
source = "../../LICENSE-APACHE"
dest = "/usr/share/doc/valenx/LICENSE-APACHE"
mode = "0644"
# Desktop integration — mirrors the cargo-deb assets block above so
# the RPM install lands Valenx in the GNOME / KDE / XFCE application
# menus too, with the freedesktop hicolor theme resolving the bare
# `Icon=valenx` reference to either the 256x256 raster (older
# launchers) or the SVG (modern HiDPI launchers).
[[package.metadata.generate-rpm.assets]]
source = "../../packaging/linux/valenx.desktop"
dest = "/usr/share/applications/valenx.desktop"
mode = "0644"
[[package.metadata.generate-rpm.assets]]
source = "../../packaging/linux/valenx-256.png"
dest = "/usr/share/icons/hicolor/256x256/apps/valenx.png"
mode = "0644"
[[package.metadata.generate-rpm.assets]]
source = "../../packaging/linux/valenx.svg"
dest = "/usr/share/icons/hicolor/scalable/apps/valenx.svg"
mode = "0644"
