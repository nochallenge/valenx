[package]
name        = "valenx-springs"
description = "Springs workbench (Phase 40) — parametric helical spring generator for compression, extension, and torsion springs. Emits a swept wire-circle solid along the centreline plus the canonical stiffness formula k = Gd^4 / (8 D^3 n_active)."

version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true

[dependencies]
thiserror = { workspace = true }
nalgebra  = { workspace = true }
serde     = { workspace = true }
ron       = { workspace = true }

valenx-mesh = { path = "../valenx-mesh" }
valenx-cad  = { path = "../valenx-cad" }

[lints.rust]
unused_imports = "warn"
missing_docs   = "warn"
