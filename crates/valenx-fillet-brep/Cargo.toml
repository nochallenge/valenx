[package]
name        = "valenx-fillet-brep"
description = "True-BRep fillet/chamfer for Valenx (Phase 14). Operates on truck-modeling BRep faces and edges instead of triangle meshes; output is a Solid::Brep that round-trips through STEP and downstream boolean ops."

version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true

publish.workspace     = true
[dependencies]
anyhow         = { workspace = true }
thiserror      = { workspace = true }
tracing        = { workspace = true }
nalgebra       = { workspace = true }
truck-modeling = { workspace = true }

valenx-cad = { path = "../valenx-cad" }

[lints.rust]
unused_imports = "warn"
missing_docs   = "warn"
