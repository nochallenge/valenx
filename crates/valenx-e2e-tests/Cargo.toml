[package]
name         = "valenx-e2e-tests"
description  = "End-to-end integration tests that spawn real upstream tools through the Valenx adapter trait. Run only in CI nightly (or locally when the tools are installed)."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true
readme.workspace       = true

# Empty src/ — this crate is tests-only.

publish.workspace     = true
[dev-dependencies]
valenx-core         = { path = "../valenx-core" }
valenx-fields       = { path = "../valenx-fields" }
valenx-test-utils   = { path = "../valenx-test-utils" }

