[package]
name        = "valenx-pipeflow"
description = "Internal (pipe) flow hydraulics — Reynolds number Re = rho*v*D/mu, laminar Darcy friction f = 64/Re, turbulent friction by the explicit Haaland correlation (an algebraic approximation to the implicit Colebrook-White equation), Darcy-Weisbach head loss hf = f*(L/D)*v^2/(2g), and laminar/transitional/turbulent regime classification. Research/educational grade: textbook closed-form and well-established numerical models; NOT a clinical/medical or production engineering tool."

version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true

publish.workspace = true

[dependencies]
thiserror = { workspace = true }
serde     = { workspace = true }

[dev-dependencies]
# Round-trip serialization tests for the public result structs.
serde_json = { workspace = true }

[lints.rust]
unused_imports = "warn"
missing_docs   = "warn"
