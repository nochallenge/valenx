[package]
name         = "valenx-adapter-freecad"
description  = "Subprocess-isolated adapter for FreeCAD's headless CAD kernel. Phase 2 scaffold — parametric modeling, STEP/IGES import."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true
readme.workspace       = true

# FreeCAD ships LGPL-2.1; driving it headlessly via FreeCADCmd keeps
# Valenx's link surface clean of GPL'd Qt bits.

publish.workspace     = true
[dependencies]
anyhow       = { workspace = true }
thiserror    = { workspace = true }
tracing      = { workspace = true }
semver       = { workspace = true }
toml         = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }

valenx-core   = { path = "../../../valenx-core" }
valenx-fields = { path = "../../../valenx-fields" }
valenx-geo    = { path = "../../../valenx-geo" }
