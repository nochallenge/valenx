[package]
name         = "valenx-adapter-cantera"
description  = "Subprocess adapter driving Cantera's Python API for equilibrium / reactor / flame calculations. Phase 4 — live for equilibrium."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true
readme.workspace       = true

# Cantera ships BSD-3-Clause, so license-wise we could link directly
# via a `cantera-sys` shim later. For now we drive its Python API
# through a `python -m cantera` subprocess, same pattern as FreeCAD.

publish.workspace     = true
[dependencies]
anyhow       = { workspace = true }
thiserror    = { workspace = true }
tracing      = { workspace = true }
semver       = { workspace = true }
toml         = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }

valenx-core   = { path = "../../../valenx-core" }
valenx-fields = { path = "../../../valenx-fields" }
