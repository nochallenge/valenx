physics = "bio"
solver  = "ctffind.estimate"
mesh    = "(none)"

# CTFFIND CTF estimation. NOTE: CTFFIND is licensed for non-
# commercial / academic use only — confirm your use case complies
# with the Janelia license before redistributing CTF estimates.
# `pixel_size` in Å, `voltage` in kV, `cs` in mm,
# `amplitude_contrast` 0..=1 (0.07 typical for cryo).
[bio.ctffind]
micrograph           = "movie.mrc"
output_diagnostic    = "diagnostic.mrc"
output_txt           = "ctf_params.txt"
pixel_size           = 1.06
voltage              = 300.0
cs                   = 2.7
amplitude_contrast   = 0.07
extra_args           = []
