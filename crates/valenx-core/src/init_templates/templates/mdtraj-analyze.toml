physics = "bio"
solver  = "mdtraj.analyze"
mesh    = "(none)"

# MDTraj Python trajectory analyzer (sister to MDAnalysis with
# wider format support). The user-supplied .py script does
# `import mdtraj` and the analysis work; it can read
# `valenx_params.json` for the staged trajectory + topology
# filenames and the configured `output_basename`.
[bio.mdtraj]
script           = "analyze.py"
python           = "python3"
trajectory       = "md.xtc"
topology         = "md.pdb"
output_basename  = "analysis"
