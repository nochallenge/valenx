physics = "bio"
solver  = "pydna.design"
mesh    = "(none)"

# pydna Bjorn-Johansson Python plasmid / clone-design library.
# The user-supplied .py script does `import pydna` and the
# design work; it can read `valenx_params.json` for the
# configured `output_basename` and the staged `input_genbank`
# filename.
[bio.pydna]
script           = "design.py"
python           = "python3"
# input_genbank  = "template.gb"
output_basename  = "design"
