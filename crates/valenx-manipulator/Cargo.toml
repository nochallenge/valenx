[package]
name        = "valenx-manipulator"
description = "Manipulator workbench (Phase 41) — free-form direct push/pull editing of BRep solids. Apply face/edge/vertex moves, rotations, extrusions, and offsets via a tessellation-based v1 pipeline that returns a Solid::Mesh, ready for viewport rendering and downstream mesh-domain operations."

version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
authors.workspace      = true
license.workspace      = true
repository.workspace   = true

[dependencies]
thiserror = { workspace = true }
nalgebra  = { workspace = true }
serde     = { workspace = true }
ron       = { workspace = true }

valenx-mesh = { path = "../valenx-mesh" }
valenx-cad  = { path = "../valenx-cad" }

[lints.rust]
unused_imports = "warn"
missing_docs   = "warn"
