# Workspace manifest for Valenx.
#
# Every crate under `crates/` is a workspace member. Shared metadata
# (version, edition, license) lives in `[workspace.package]` so
# individual crates just inherit with `.workspace = true`.
#
# Dependency versions are pinned here so every crate uses the same
# version of common libs; update in one place.

[workspace]
resolver = "2"
members = [
    # Native shell + canonical types
    "crates/valenx-app",
    "crates/valenx-astro",
    "crates/valenx-core",
