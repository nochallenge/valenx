# ---------------------------------------------------------------------------
# Shared crate metadata
# ---------------------------------------------------------------------------

[workspace.package]
version      = "0.1.0-alpha.1"
edition      = "2021"
rust-version = "1.88"  # MSRV = stable - 3 (see POLICIES.md). Bumped via PR when stable moves. 1.88 required for eframe 0.28's transitive `image@0.25.10`.
authors      = ["Valenx contributors"]
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/nochallenge/valenx"
homepage     = "https://github.com/nochallenge/valenx"
readme       = "README.md"
publish      = false   # workspace-level default; sibling crates inherit via `publish.workspace = true`

# ---------------------------------------------------------------------------
# Shared dependency versions
# ---------------------------------------------------------------------------

[workspace.dependencies]
# Error handling
anyhow     = "1"
thiserror  = "2"

# Serialization
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
toml        = "0.8"
ron              = "0.8"
nalgebra-sparse  = "0.10"

# OS link/file opener — used by valenx-app for "open project workdir
# in the file manager" / "open the help URL" affordances. Lives at
# workspace level so any first-party crate that needs to open an
# external URL or file path picks up the same pinned version.
opener      = "0.8"

# Observability
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Numerics
ndarray   = "0.15"
nalgebra  = { version = "0.33", features = ["serde-serialize"] }
byteorder = "1"

# ZLIB / deflate codec — used by the JT reader for ZLIB-compressed
# segment payloads (the common production-file case) and available to
# any other format reader that needs raw inflate / deflate. Already in
# the lockfile as a transitive dep of vtkio; pinning at workspace level
# so first-party use is explicit.
flate2    = "1"

# Concurrency
rayon  = "1"
tokio  = { version = "1", features = ["rt-multi-thread", "macros", "process", "sync", "time", "io-util", "io-std"] }

# Cross-platform file locking — used by `valenx-audit` to serialise
# concurrent `AuditWriter::append` calls so the SHA-256 prev_hash
# chain stays intact even when two threads / processes race against
# the same log. Pure-Rust shim around `flock(2)` (POSIX) and
# `LockFileEx` (Windows); no native side-deps.
fs2 = "0.4"

# Hashing / IDs
sha2 = "0.10"
uuid = { version = "1", features = ["v4", "serde"] }

# SemVer
semver = "1"

# Native UI — eframe wraps winit + egui with a default glow backend.
# wgpu bindings are activated via the backend feature when the
# viewport crate graduates to its own renderer.
eframe    = { version = "0.28", default-features = false, features = ["default_fonts", "wgpu", "wayland", "x11"] }
egui      = "0.28"
egui_plot = "0.28"
# wgpu + bytemuck for the custom viewport render pipeline. eframe's
# wgpu feature re-exports `eframe::wgpu` + `eframe::egui_wgpu`.
bytemuck  = { version = "1", features = ["derive"] }

# Native file dialogs (OS-native picker on every platform). Default
# features pick Win32 / AppKit / xdg-portal depending on platform.
rfd    = "0.14"

# Dynamic-library loading for the plugin loader (valenx-plugin).
# Cross-platform `dlopen` / `LoadLibrary` wrapper.
libloading = "0.8"

# Rust-native BRep CAD kernel (RICOS Co. Ltd, Apache-2.0). Powers the
# Part workbench's primitives, booleans, and tessellation in
# `valenx-cad`. Disable `truck-shapeops` default features to avoid the
# `truck-stepio` test dependency on STEP I/O, which we don't use.
truck-modeling = "0.6"
# truck-meshalgo: keep vtk feature; the lz4_flex 0.7→0.11 RUSTSEC-2026-0041
# mitigation lives in vendor/vtkio (see vendor/vtkio/CHANGES_VS_UPSTREAM.md).
# Cargo.lock confirms lz4_flex 0.11.6 is the only version present.
truck-meshalgo = "0.4"
truck-shapeops = { version = "0.4", default-features = false }

# ---------------------------------------------------------------------------
# Release and dev profiles
# ---------------------------------------------------------------------------

[profile.release]
opt-level     = 3
lto           = "thin"
codegen-units = 1
strip         = "symbols"
panic         = "abort"

[profile.dev]
# A little optimization on our own crates: opt-level 1 captures most of
# the runtime speedup of higher levels while staying fast to compile.
# The compute-heavy crates (CFD / FEM / aero / MD solvers) run ~5-20x
# faster than the opt-level-0 default, so the dev test suite stops being
# dominated by unoptimized numerics.
opt-level = 1
debug     = true

# Dependencies (nalgebra, ndarray, etc.) fully optimized even in dev /
# test builds. They compile once and are cached, so this doesn't slow
# day-to-day iteration — it only speeds the numerics that lean on them.
# Standard recipe for compute-heavy Rust workspaces (the Bevy-book
# pattern); applies to external deps, not the workspace crates above.
[profile.dev.package."*"]
opt-level = 3

# valenx-aero is the one genuinely compute-bound long-pole crate — its
# immersed-boundary cut-cell CFD tests dominated the suite (57 min at
# opt-level 0, 9 min at opt-level 1). Fully optimize it in both the dev
# and test profiles; it's rarely edited, so the slower recompile is a
# fine trade for the test-run speedup. The other numerical crates
# (cfd-native, fem, md) already run sub-second, so they deliberately do
# NOT get this — it would only slow their recompiles for no gain.
[profile.dev.package.valenx-aero]
opt-level = 3
[profile.test.package.valenx-aero]
opt-level = 3

# Faster release-for-validation builds during development.
[profile.release-fast]
inherits     = "release"
lto          = "off"
codegen-units = 16
incremental  = true

# Benchmarks need release-like performance but with debuginfo.
[profile.bench]
inherits = "release"
debug    = true
strip    = "none"

# Vendored vtkio with lz4_flex bumped from 0.7.5 → 0.11 to resolve
# RUSTSEC-2026-0041 (lz4_flex decompress can leak uninit memory). The
# vtk feature path in our deps (truck-shapeops → truck-meshalgo →
# vtkio → lz4_flex) couldn't be broken via cargo feature unification,
# so we patch vtkio at the source level. See vendor/vtkio/Cargo.toml
# for the version suffix `+valenx-patch` and minimal source diffs.
#
# WARNING (round-16 L2): the `vtkio` patch entry below MUST be removed
# in the same commit that removes `vendor/vtkio/`. If the directory
# is deleted but this line is left, the next `cargo build` errors
# with `error: failed to resolve patches for ... vendor/vtkio` and
# every workspace member fails to compile. If the line is removed but
# the directory is left, the patched lz4_flex bump is silently lost
# and RUSTSEC-2026-0041 reappears via the transitive truck-shapeops
# → vtkio → lz4_flex 0.7.5 path. Always update both in lockstep.
[patch.crates-io]
vtkio = { path = "vendor/vtkio" }
