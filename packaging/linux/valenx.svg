<?xml version="1.0" encoding="UTF-8"?>
<!--
  Valenx app icon. Brand mark: white "V" on the Valenx accent blue
  (#4B9EFF, lifted from crates/valenx-design-tokens/tokens.json).
  Geometry mirrors crates/valenx-app/wix/valenx.ico (rounded square,
  corner radius = size/6; padding + stroke = 18% of viewport).
  Used by Linux desktop environments via /usr/share/icons/hicolor/
  scalable/apps/valenx.svg. SVG so it scales cleanly to whatever
  DPI the launcher / dock / activities-overview asks for.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect x="0" y="0" width="256" height="256" rx="42" ry="42" fill="#4B9EFF"/>
  <path d="M 46 46 L 128 210 L 210 46"
        fill="none" stroke="#FFFFFF" stroke-width="46"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
