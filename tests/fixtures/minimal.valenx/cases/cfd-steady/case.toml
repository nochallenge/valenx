[case]
format  = "1.0"
name    = "cfd-steady"
physics = "cfd"
solver  = "openfoam.simpleFoam"
mesh    = "default"

[flow]
turbulence = "kOmegaSST"
schemes    = "upwind-first-order"

[flow.fluid]
name = "air"
rho  = 1.225
nu   = 1.5e-5

[boundaries.inlet]
type     = "velocity-inlet"
velocity = [50.0, 0.0, 0.0]
turbulence_intensity = 0.05

[boundaries.outlet]
type     = "pressure-outlet"
pressure = 0.0

[boundaries.walls]
type = "no-slip"

[solve]
iterations      = 2000
residual_target = 1e-5
