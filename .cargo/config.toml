# Workspace cargo config.
#
# Currently only used to make `cargo build --workspace --all-targets`
# succeed on macOS for the `valenx-py` cdylib target. PyO3's
# `extension-module` feature deliberately does NOT link to libpython
# — the host interpreter provides the symbols when the wheel is
# loaded — but on macOS `cdylib` builds still fail at link time with
# "symbol(s) not found" unless the linker is told that undefined
# symbols will be resolved at load time.
#
# These flags are identical to what `maturin develop` injects under
# the hood. Linux uses the same convention (`-Wl,-undefined,dynamic_lookup`
# is a no-op there; the symbols are resolved at load time via lazy
# binding without any flag), so we only need the override on Apple
# targets.

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

# ── Faster linking on Windows (committed so every contributor + CI gets it) ──
# Use the LLVM linker (rust-lld, bundled with every Rust toolchain) instead of
# the default MSVC link.exe. On this workspace, link.exe makes a one-file-change
# rebuild of valenx-app take ~143s; rust-lld makes it ~5s (~28x). The bare name
# "rust-lld" resolves from the active toolchain's sysroot, so it survives
# `rustup update` and works on any windows-msvc machine without installing LLVM.
# Measured 2026-06-20 on 1.88.0-x86_64-pc-windows-msvc.
[target.x86_64-pc-windows-msvc]
linker = "rust-lld"
rustflags = ["-C", "linker-flavor=lld-link"]
